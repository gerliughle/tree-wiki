{% extends "template.html" %} #}
{% block title %}Login{% endblock %}
{% block content %}

<div class="container justify-content-center col-md-4 col-10 my-5 py-5">
    <form method="POST" action="/do_login">
        <h5 class="mb-3">Please sign in:</h5>

        <div class="flex-column mb-3">

            <div class="form-floating w-100">
                <input name="username" class="form-control rounded-bottom-0" id="username" placeholder="username" required>
                <label for="username">Username</label>
            </div>

            <div class="form-floating w-100">
                <input type="password" class="form-control rounded-top-0 border-top-0" id="password" placeholder="Password" required>
                <label for="password">Password</label>
            </div>

        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-primary flex-grow-1" type="submit">Sign in</button>
            <button class="btn btn-outline-secondary" formaction="/do_register">Register</button>
        </div>
    </form>
</div>


{% endblock %}
