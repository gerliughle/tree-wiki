{% extends "template.html" %}
{% block title %}Select Branch to Delete{% endblock %}
{% block content %}
    <div class="container col-md-4 col-8">

        <form method="POST" action="/check_delete_branch">
            <h3 class="my-2">Select a branch to delete</h3>
            <select class="form-select my-1" aria-label="Select branch" name="select_branch_id" required>
                <option selected value="">Select branch</option>
                {% for branch in branches %}
                    <option value="{{ branch.id }}">{{ branch.name }}</option>
                {% endfor %}
            </select>


            <div class="row">
                <div class="col 1">
                    <button type="submit" class="btn btn-primary">Select</button>
                    <a href="/">Cancel</a>
                </div>
            </div>
        </form>

    </div>

{% endblock %}
